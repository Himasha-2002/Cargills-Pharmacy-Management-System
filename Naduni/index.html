<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargills Pharmacy</title>

    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="assest/style.css">

    <!-- Add Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJX3Jb9U0lRlz6l3L0EgyhP5B2dTlW5fy3g6b5VzXkx20w3mH7SzUrF3LTxF" crossorigin="anonymous">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="text-center">
            <h1 class="welcome mb-4">WELCOME TO</h1>
            <div class="pharmacy-box p-5 rounded-5 shadow-lg">
                <p class="cargills"><b>Cargills</b></p>
                <h2 class="pharmacy mb-4">PHARMACY</h2>
                <img src="img/0gxtw_128.jpg" alt="Pharmacy Icon" class="pharmacy-icon mb-3" style="width: 80px; height: auto;">
                <p class="since mb-4">Since 1844</p>

                <!-- Login and Signup Buttons -->
                <div class="auth-buttons">
                    <button class="login-btn mb-3">Login</button>
                    <button class="signup-btn">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="assest/script.js"></script>

    <!-- Add Bootstrap JS and Popper.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybKufT5Or9G7l6z7wDyyq3/k5K/TM3+9h7yE9wJ4/oed6p0gF" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-pzjw8f+ua7Kw1TIq0m3fu6B6uWl9rXiiim8VZFTFbV2z8zXryZP2fWY4o9TL/c+e5" crossorigin="anonymous"></script>
</body>
</html>
